services:
  shoko:
    image: shokoanime/server:latest
    container_name: shoko
    labels:
      traefik.enable: true    # enabling traefik on this app
      traefik.http.routers.shoko.middlewares: auth@file   # enabling authelia security login
      traefik.http.routers.shoko.rule: Host(`shoko.nightowls.pro`)
      traefik.http.routers.shoko.entrypoints: https
      traefik.http.services.shoko.loadbalancer.server.port: 8111
    volumes:
      - ./shoko_config:/home/shoko/.shoko
      - ${MEDIA_DIR:?err}:/data/media:rw
    environment:
      TZ: America/Vancouver
      PGID: ${PGID:?err}
      PUID: ${PUID:?err}
      UMASK: ${UMASK:?err}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - proxy
    restart: always
    shm_size: 256m

networks:
  proxy:
    external: true
