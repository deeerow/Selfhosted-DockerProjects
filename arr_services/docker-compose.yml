x-app: &default
  restart: unless-stopped
  networks:
    -  proxy
  environment: &environment
    TZ: America/Vancouver
    PGID: ${PGID:?err}
    PUID: ${PUID:?err}
    UMASK: ${UMASK:?err}
  labels: &labels
    traefik.enable: true
    com.centurylinklabs.watchtower.enable: true
  security_opt:
    - no-new-privileges:true

services:
  radarr:
    <<: *default
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    volumes:
      - ./radarr:/config
      - ${MEDIA_DIR:?err}:/data
    labels:
      <<: *labels
      traefik.http.routers.radarr.middlewares: auth@file
      traefik.http.routers.radarr.rule: Host(`radarr.nightowls.pro`)
      traefik.http.routers.radarr.entrypoints: https
      traefik.http.services.radarr.loadbalancer.server.port: 7878

  sonarr:
    <<: *default
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:latest
    volumes:
      - ./sonarr:/config
      - ${MEDIA_DIR:?err}:/data
    labels:
      <<: *labels
      traefik.http.routers.sonarr.middlewares: auth@file
      traefik.http.routers.sonarr.rule: Host(`sonarr.nightowls.pro`)
      traefik.http.routers.sonarr.entrypoints: https
      traefik.http.services.sonarr.loadbalancer.server.port: 8989

  prowlarr:
    <<: *default
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - ./prowlarr:/config
    labels:
      <<: *labels
      traefik.http.routers.prowlarr.middlewares: auth@file
      traefik.http.routers.prowlarr.rule: Host(`prowlarr.nightowls.pro`)
      traefik.http.routers.prowlarr.entrypoints: https
      traefik.http.services.prowlarr.loadbalancer.server.port: 9696

  notifiarr:
    <<: *default
    container_name: notifiarr
    hostname: notifiarr
    image: golift/notifiarr:latest
    volumes:
      - ./notifiarr:/config
      - /var/run/utmp:/var/run/utmp
    labels:
      <<: *labels
      traefik.http.routers.notifiarr.middlewares: auth@file
      traefik.http.routers.notifiarr.rule: Host(`notifiarr.nightowls.pro`)
      traefik.http.routers.notifiarr.entrypoints: https
      traefik.http.services.notifiarr.loadbalancer.server.port: 5454

  flaresolverr:
    <<: *default
    container_name: flaresolverr
    hostname: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    labels:
      <<: *labels
      traefik.http.routers.flaresolverr.middlewares: auth@file
      traefik.http.routers.flaresolverr.rule: Host(`flaresolverr.nightowls.pro`)
      traefik.http.routers.flaresolverr.entrypoints: https
      traefik.http.services.flaresolverr.loadbalancer.server.port: 8191

  dispatcharr:
    <<: *default
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr
    volumes:
      - ./dispatcharr:/data    # /data/db needs to be 700or750 permissions
    labels:
      <<: *labels
      traefik.http.routers.dispatcharr.middlewares: auth@file
      traefik.http.routers.dispatcharr.rule: Host(`dispatcharr.nightowls.pro`)
      traefik.http.routers.dispatcharr.entrypoints: https
      traefik.http.services.dispatcharr.loadbalancer.server.port: 9191
    environment:
      <<: *environment
      DISPATCHARR_ENV: aio
      REDIS_HOST: localhost
      CELERY_BROKER_URL: redis://localhost:6379/0
      DISPATCHARR_LOG_LEVEL: info

volumes:
  dispatcharr:

networks:
  proxy:
    external: true
